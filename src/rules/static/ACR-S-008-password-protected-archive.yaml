id: ACR-S-008
version: "1.0.0"
title: "Password-protected archive download"
status: active
created: "2026-03-19"
author: "AgentCanary Core"
confidence: high
severity: critical
category: malware_delivery
subcategory: protected-archive
description: >
  Detects patterns where password-protected archives are downloaded and extracted.
  Password protection evades automated scanning tools. Seen in ToxicSkills campaign:
  malicious binaries hidden in password-protected ZIPs.
tags:
  - malware
  - archive
  - evasion
  - toxicskills
mitre:
  tactics:
    - defense-evasion
    - execution
  techniques:
    - T1027.002
    - T1204.002
applies_to:
  - mcp_server
  - skill_file
  - npm_package
detection:
  check_type: static_pattern
  patterns:
    - id: unzip_with_password
      description: "unzip with -P password flag"
      type: regex
      value: "unzip\\s+-P\\s+['\"]?\\w+"
      target: file_content
    - id: 7z_with_password
      description: "7zip extraction with password"
      type: regex
      value: "7z\\s+(x|e)\\s+-p"
      target: file_content
    - id: tar_passphrase
      description: "tar with passphrase/gpg decryption"
      type: regex
      value: "tar.*--passphrase|gpg\\s+--decrypt.*tar"
      target: file_content
    - id: openssl_decrypt_archive
      description: "OpenSSL decrypt then extract"
      type: regex
      value: "openssl\\s+(enc|aes).*(-d|-decrypt).*\\.(zip|tar|gz|7z)"
      target: file_content
    - id: download_then_unzip_password
      description: "Download archive then extract with password"
      type: regex
      value: "(curl|wget).*?\\.(zip|7z|rar).*?&&.*?(unzip\\s+-P|7z.*-p)"
      target: file_content
    - id: zip_download_with_password_instruction
      description: "Archive download with password provided in instructions (social engineering)"
      type: regex
      value: "\\.(zip|7z|rar).*?(pass(word)?|extract).*?[:=`]\\s*['\"`]?[a-zA-Z0-9_-]{3,}"
      target: file_content
      case_sensitive: false
  condition: any
report:
  title: "Password-protected archive download detected"
  recommendation: >
    This code downloads a password-protected archive — a technique used to hide
    malicious binaries from automated scanners. The password is embedded in the
    skill itself. This is a strong indicator of malware delivery. Do not install.
false_positives:
  - "Legitimate encrypted backup/deployment tools (rare in agent skills)"
provenance:
  source: snyk_toxicskills_research
  first_seen: "2026-03-19"
