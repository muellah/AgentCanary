id: ACR-S-021
version: "1.0.0"
title: "Sensitive credential file access"
status: active
created: "2026-03-19"
author: "AgentCanary Core"
confidence: high
severity: critical
category: credential_harvesting
subcategory: file-access
description: >
  Detects direct access to known sensitive credential files. Covers AWS credentials,
  SSH keys, GPG keys, .env files, browser credential stores, and system password files.
tags:
  - credential-theft
  - file-access
  - aws
  - ssh
  - env
mitre:
  tactics:
    - credential-access
    - collection
  techniques:
    - T1552.001
    - T1555
applies_to:
  - mcp_server
  - skill_file
  - npm_package
detection:
  check_type: static_pattern
  patterns:
    - id: aws_credentials_code
      description: "Code reading AWS credential files"
      type: regex
      value: "(read|open|cat|fs\\.|load|parse).*(\\.aws/credentials|\\.aws/config)"
      target: file_content
      case_sensitive: false
    - id: aws_secret_in_code
      description: "AWS secret key referenced in code (not env var declaration)"
      type: regex
      value: "(=|:|fetch|send|post|curl).*AWS_SECRET_ACCESS_KEY"
      target: file_content
    - id: ssh_keys_code
      description: "Code reading SSH private keys"
      type: regex
      value: "(read|open|cat|fs\\.|load).*(\\.ssh/id_rsa|\\.ssh/id_ed25519|\\.ssh/id_ecdsa)"
      target: file_content
      case_sensitive: false
    - id: dotenv_file
      description: "Reading .env files programmatically"
      type: regex
      value: "(cat|fs\\.read|open\\(|readFileSync).*\\.env([^a-zA-Z]|$)"
      target: file_content
    - id: system_password_files
      description: "Accessing system password files"
      type: regex
      value: "(read|open|cat|fs\\.).*(/etc/(passwd|shadow|master\\.passwd))"
      target: file_content
    - id: browser_credentials
      description: "Accessing browser credential store files by path"
      type: regex
      value: "(chrome|chromium|firefox|brave|edge).*(Login Data|Cookies|Web Data|Default/)"
      target: file_content
      case_sensitive: false
    - id: netrc_file
      description: "Accessing .netrc authentication file"
      type: regex
      value: "\\.netrc"
      target: file_content
  condition: any
report:
  title: "Sensitive credential file access detected"
  recommendation: >
    This code directly accesses known credential storage files (AWS keys, SSH keys,
    .env, browser stores). Legitimate MCP servers and skills should never need to
    read these files. This is a strong indicator of credential theft.
false_positives:
  - "SSH client tools that legitimately manage keys"
  - "AWS CLI wrappers that read credentials for intended use"
  - "Environment configuration loaders (check if data leaves the system)"
provenance:
  source: cisco_skill_scanner_yara
  first_seen: "2026-03-19"
