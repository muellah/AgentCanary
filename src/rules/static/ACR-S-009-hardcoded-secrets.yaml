id: ACR-S-009
version: "1.0.0"
title: "Hardcoded secrets and credentials"
status: active
created: "2026-03-19"
author: "AgentCanary Core"
confidence: medium
severity: critical
category: credential_exposure
subcategory: hardcoded-secrets
description: >
  Detects hardcoded API keys, tokens, passwords, and credentials in skill files.
  10.9% of ClawHub skills contained hardcoded credentials (Snyk research).
  May indicate stolen credentials, test keys left in production, or intentional backdoors.
tags:
  - secrets
  - credentials
  - api-key
  - hardcoded
mitre:
  tactics:
    - credential-access
  techniques:
    - T1552.001
applies_to:
  - mcp_server
  - skill_file
  - npm_package
detection:
  check_type: static_pattern
  patterns:
    - id: aws_access_key
      description: "AWS Access Key ID"
      type: regex
      value: "AKIA[0-9A-Z]{16}"
      target: file_content
    - id: github_token
      description: "GitHub personal access token"
      type: regex
      value: "ghp_[A-Za-z0-9]{36}"
      target: file_content
    - id: anthropic_key
      description: "Anthropic API key"
      type: regex
      value: "sk-ant-[A-Za-z0-9-]{20,}"
      target: file_content
    - id: openai_key
      description: "OpenAI API key"
      type: regex
      value: "sk-[A-Za-z0-9]{20,}"
      target: file_content
    - id: generic_api_key_assignment
      description: "Generic API key or secret assignment with realistic-looking value"
      type: regex
      value: "(api[_-]?key|api[_-]?secret|auth[_-]?token|access[_-]?token|secret[_-]?key)\\s*[:=]\\s*['\"][A-Za-z0-9+/=_-]{32,}['\"]"
      target: file_content
      case_sensitive: false
    - id: password_assignment
      description: "Password hardcoded in assignment"
      type: regex
      value: "(password|passwd|pwd)\\s*[:=]\\s*['\"][^'\"]{8,}['\"]"
      target: file_content
      case_sensitive: false
    - id: bearer_token
      description: "Hardcoded Bearer token"
      type: regex
      value: "Bearer\\s+[A-Za-z0-9._-]{20,}"
      target: file_content
    - id: slack_token
      description: "Slack bot/user token"
      type: regex
      value: "xox[bpors]-[A-Za-z0-9-]{10,}"
      target: file_content
  condition: any
report:
  title: "Hardcoded secrets detected in code"
  recommendation: >
    This skill contains what appears to be a hardcoded API key, token, or password.
    This could be: (1) stolen credentials embedded for exfiltration, (2) test credentials
    accidentally left in code, or (3) an intentional backdoor. Review carefully before use.
    If you've already installed, rotate any exposed credentials immediately.
false_positives:
  - "Example/placeholder keys in documentation"
  - "Test fixtures with dummy credentials"
  - "Base64-encoded non-secret data that matches key patterns"
provenance:
  source: snyk_toxicskills_research
  first_seen: "2026-03-19"
